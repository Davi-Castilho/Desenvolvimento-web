<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Base</title>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        /* NAVBAR */
        header {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            color: #fff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00f2fe;
        }

        /* CONTEÚDO */
        main {
            padding: 40px;
            min-height: 70vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* RODAPÉ */
        footer {
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            padding: 15px;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- MENU DE NAVEGAÇÃO -->
    {% include 'web/menu.html' %}

    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <div class="container">
            {% include 'web/mensagens.html' %}
            {% block conteudo %} <!-- Conteúdo --> {% endblock %} 
        </div>
    </main>

    <!-- RODAPÉ -->
    <footer>
        <p>&copy; 2026 - MeuSite. Todos os direitos reservados.</p>
    </footer>

</body>
</html>

{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Cadastrar Cliente</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="text" name="cpf" placeholder="CPF" required>
        <input type="text" name="telefone" placeholder="Telefone">
        <input type="text" name="endereco" placeholder="Endereço">
        <button type="submit">Cadastrar</button>
    </form>
</div>

<div class="card">
    <h2>Lista de Clientes</h2>
    <table>
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Endereço</th>
            <th>Ações</th> </tr>
        {% for c in clientes %}
        <tr>
            <td>{{ c.nome }}</td>
            <td>{{ c.cpf }}</td>
            <td>{{ c.telefone }}</td>
            <td>{{ c.endereco }}</td>
            <td>
                <a href="{% url 'editar_cliente' c.id %}" style="color: blue; margin-right: 10px;">Editar</a>
                <a href="{% url 'deletar_cliente' c.id %}" style="color: red;" onclick="return confirm('Tem certeza que deseja excluir?')">Deletar</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}

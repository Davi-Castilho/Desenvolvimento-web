{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>Login do Sistema</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Usuário" required>

        <input type="password" name="password" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>

    <br>

    <a href="/password_reset/">
        Esqueceu sua senha?
    </a>
</div>

{% endblock %}

{% extends 'products/base.html' %}

{% block content %}
<h1>{{ product.name }}</h1>
<div class="mb-3">
    <strong>Descrição:</strong>
    <p>{{ product.description|linebreaksbr }}</p>
</div>
<div class="row">
    <div class="col-md-3">
        <strong>Preço:</strong>
        <p>R$ {{ product.price }}</p>
    </div>
    <div class="col-md-3">
        <strong>Estoque:</strong>
        <p>{{ product.stock }}</p>
    </div>
    <div class="col-md-3">
        <strong>Criado em:</strong>
        <p>{{ product.created_at }}</p>
    </div>
</div>
<a class="btn btn-warning" href="/produtos/{{ product.pk }}/editar/">Editar</a>
<a class="btn btn-danger" href="/produtos/{{ product.pk }}/excluir/">Excluir</a>
<a class="btn btn-secondary" href="/">Voltar</a>
{% endblock %}
